<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melville Theatre — Admin</title>
  <link rel="icon" href="../fav/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:   #e8a020;
      --amber-d: #c07010;
      --bg:      #0d0d0d;
      --surface: #161616;
      --card:    #1e1e1e;
      --border:  #2e2e2e;
      --text:    #e8e8e8;
      --muted:   #888;
      --green:   #2db37a;
      --red:     #d94f4f;
      --blue:    #4a9eff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.55;
      min-height: 100vh;
    }

    /* ── Header ── */
    .admin-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-logo { font-size: 18px; font-weight: 700; letter-spacing: .04em; color: var(--amber); }
    .admin-logo span { color: var(--text); font-weight: 400; }
    .admin-header-right { margin-left: auto; }
    .btn-view-site {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .btn-view-site:hover { border-color: var(--amber); color: var(--amber); }

    /* ── Layout ── */
    .admin-wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 100px; }

    /* ── Lock screen ── */
    #lock-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: calc(100vh - 61px);
      gap: 20px; padding: 40px 20px;
    }
    .lock-icon { font-size: 48px; }
    .lock-title { font-size: 22px; font-weight: 700; }
    .lock-sub   { color: var(--muted); font-size: 14px; }
    .lock-form  { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .lock-form input {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 11px 16px; border-radius: 8px;
      font-size: 15px; width: 220px; outline: none; transition: border-color .2s;
    }
    .lock-form input:focus { border-color: var(--amber); }
    .btn-unlock {
      background: var(--amber); color: #000; border: none;
      padding: 11px 24px; border-radius: 8px; font-size: 15px;
      font-weight: 700; cursor: pointer; transition: background .2s;
    }
    .btn-unlock:hover { background: var(--amber-d); }
    .lock-error { color: var(--red); font-size: 14px; display: none; }

    /* ── Section title ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--amber);
    }

    /* ── Status badge ── */
    .status-badge {
      font-size: 10px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 20px;
    }
    .status-playing { background: var(--amber); color: #000; }
    .status-soon    { background: var(--border); color: var(--muted); }
    .status-past    { background: transparent; color: #555; border: 1px solid #333; }

    /* ── Film row ── */
    .film-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

    .film-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .film-row.is-playing { border-color: var(--amber); }
    .film-row.is-past    { opacity: .5; }

    .film-row-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; cursor: pointer; user-select: none;
    }
    .film-row-header:hover { background: rgba(255,255,255,.03); }

    .film-row-info { flex: 1; min-width: 0; }
    .film-row-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .film-row-dates { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .film-row-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-icon {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); padding: 5px 10px; border-radius: 6px;
      font-size: 12px; cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-icon:hover { border-color: var(--text); color: var(--text); }
    .btn-icon.danger:hover { border-color: var(--red); color: var(--red); }
    .chevron {
      width: 16px; height: 16px; color: var(--muted); flex-shrink: 0;
      transition: transform .25s;
    }
    .film-row.expanded .chevron { transform: rotate(180deg); }

    /* ── Edit form (inside film row) ── */
    .film-edit-form {
      display: none;
      padding: 0 16px 20px;
      border-top: 1px solid var(--border);
    }
    .film-row.expanded .film-edit-form { display: block; }

    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    .field label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 9px 12px; border-radius: 8px;
      font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--amber); }
    .field textarea { resize: vertical; min-height: 60px; }
    .field select option { background: var(--card); }
    .field input[type="date"] { color-scheme: dark; }

    /* ── YouTube preview ── */
    .yt-preview-wrap {
      margin-top: 8px; border-radius: 8px; overflow: hidden;
      aspect-ratio: 16/9; background: #000; display: none;
    }
    .yt-preview-wrap.visible { display: block; }
    .yt-preview-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── 3D toggle ── */
    .toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .toggle-row label { font-size: 13px; color: var(--text); text-transform: none; letter-spacing: 0; font-weight: 400; cursor: pointer; margin: 0; }
    .toggle-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--amber); cursor: pointer; background: transparent; border: none; padding: 0; }

    /* ── Add movie button ── */
    .btn-add {
      width: 100%; padding: 14px; border-radius: 12px;
      border: 2px dashed var(--border); background: transparent;
      color: var(--muted); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .2s; font-family: inherit;
    }
    .btn-add:hover { border-color: var(--amber); color: var(--amber); }

    /* ── Save bar ── */
    .save-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; gap: 14px; z-index: 99;
    }
    .save-status { font-size: 14px; color: var(--muted); flex: 1; }
    .save-status.success { color: var(--green); }
    .save-status.error   { color: var(--red); }
    .btn-save {
      background: var(--amber); color: #000; border: none;
      padding: 12px 28px; border-radius: 8px; font-size: 15px;
      font-weight: 700; cursor: pointer; transition: background .2s, opacity .2s;
      white-space: nowrap;
    }
    .btn-save:hover    { background: var(--amber-d); }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(0,0,0,.3);
      border-top-color: #000; border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 6px;
    }

    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      .film-row-title { font-size: 14px; }
    }
  </style>
</head>
<body>

<header class="admin-header">
  <div class="admin-logo">MELVILLE <span>Admin</span></div>
  <div class="admin-header-right">
    <a class="btn-view-site" href="/" target="_blank">View Site ↗</a>
  </div>
</header>

<!-- Lock screen -->
<div id="lock-screen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">Admin Login</div>
  <div class="lock-sub">Enter the admin password to continue</div>
  <form class="lock-form" id="lock-form">
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
    <button type="submit" class="btn-unlock">Unlock</button>
  </form>
  <div class="lock-error" id="lock-error">Incorrect password. Try again.</div>
</div>

<!-- Admin panel -->
<div class="admin-wrap" id="admin-panel" style="display:none;">

  <div class="section-header">
    <div class="section-title">All Films</div>
    <div id="status-summary" style="font-size:12px;color:var(--muted);"></div>
  </div>

  <div class="film-list" id="film-list">
    <!-- populated by JS -->
  </div>

  <button class="btn-add" id="btn-add-film">+ Add New Film</button>

</div>

<!-- Save bar -->
<div class="save-bar" id="save-bar" style="display:none;">
  <div class="save-status" id="save-status">Ready to save.</div>
  <button class="btn-save" id="btn-save" onclick="saveFilms()">Save &amp; Deploy</button>
</div>

<script>
  // ── State ────────────────────────────────────────────────────────
  let adminPassword = '';
  let films = []; // working copy

  // ── Lock screen ──────────────────────────────────────────────────
  document.getElementById('lock-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = document.getElementById('pw-input').value.trim();
    if (!pw) return;
    adminPassword = pw;
    try {
      await loadFilms();
      unlock();
    } catch (err) {
      document.getElementById('lock-error').style.display = 'block';
      document.getElementById('lock-error').textContent = 'Could not load data. Check connection.';
    }
  });

  function unlock() {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    document.getElementById('save-bar').style.display    = 'flex';
    document.getElementById('lock-error').style.display  = 'none';
    renderFilmList();
  }

  // ── Load movies.json ─────────────────────────────────────────────
  async function loadFilms() {
    const res = await fetch('/movies.json?bust=' + Date.now());
    if (!res.ok) throw new Error('Failed to fetch');
    const data = await res.json();
    films = (data.films || []).slice(); // flat array
  }

  // ── Film status by date ──────────────────────────────────────────
  function getStatus(film) {
    const today = new Date(); today.setHours(0,0,0,0);
    const start = new Date(film.startDate + 'T00:00:00');
    const end   = new Date(film.endDate   + 'T23:59:59');
    if (today > end)   return 'past';
    if (today >= start) return 'playing';
    return 'soon';
  }

  function statusLabel(status) {
    if (status === 'playing') return '<span class="status-badge status-playing">Now Playing</span>';
    if (status === 'soon')    return '<span class="status-badge status-soon">Coming Soon</span>';
    return '<span class="status-badge status-past">Past</span>';
  }

  function formatDateRange(startStr, endStr) {
    const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const s = new Date(startStr + 'T12:00:00');
    const e = new Date(endStr   + 'T12:00:00');
    const sm = MO[s.getMonth()].toUpperCase(), em = MO[e.getMonth()].toUpperCase();
    return sm === em
      ? `${sm} ${s.getDate()}–${e.getDate()}`
      : `${sm} ${s.getDate()}–${em} ${e.getDate()}`;
  }

  // ── Render film list ─────────────────────────────────────────────
  function renderFilmList() {
    const list = document.getElementById('film-list');

    // Sort: playing first, then upcoming by date, then past newest-first
    const sorted = [...films].sort((a, b) => {
      const sa = getStatus(a), sb = getStatus(b);
      const order = { playing: 0, soon: 1, past: 2 };
      if (order[sa] !== order[sb]) return order[sa] - order[sb];
      return new Date(a.startDate) - new Date(b.startDate);
    });

    list.innerHTML = sorted.map((film, sortedIdx) => {
      // find original index for edits/deletes
      const idx = films.indexOf(film);
      const status = getStatus(film);
      const dateRange = film.startDate ? formatDateRange(film.startDate, film.endDate) : '—';
      return `
        <div class="film-row ${status === 'playing' ? 'is-playing' : ''} ${status === 'past' ? 'is-past' : ''}"
             id="film-row-${idx}">
          <div class="film-row-header" onclick="toggleExpand(${idx})">
            ${statusLabel(status)}
            <div class="film-row-info">
              <div class="film-row-title">${esc(film.title || 'Untitled')}</div>
              <div class="film-row-dates">${dateRange} · ${film.showtime || ''}</div>
            </div>
            <div class="film-row-actions" onclick="event.stopPropagation()">
              <button class="btn-icon danger" onclick="deleteFilm(${idx})">Delete</button>
            </div>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
          <div class="film-edit-form" id="edit-form-${idx}">
            ${buildEditForm(film, idx)}
          </div>
        </div>`;
    }).join('');

    updateSummary();
    bindYtPreviews();
  }

  function updateSummary() {
    const playing = films.filter(f => getStatus(f) === 'playing').length;
    const soon    = films.filter(f => getStatus(f) === 'soon').length;
    const past    = films.filter(f => getStatus(f) === 'past').length;
    document.getElementById('status-summary').textContent =
      `${playing} playing · ${soon} coming soon · ${past} past`;
  }

  function buildEditForm(film, idx) {
    const ratings = ['G','PG','14A','18A','R'].map(r =>
      `<option value="${r}" ${film.rating === r ? 'selected' : ''}>${r}</option>`
    ).join('');
    return `
      <div class="form-grid">
        <div class="field full">
          <label>Movie Title</label>
          <input type="text" id="f-${idx}-title" value="${esc(film.title || '')}" oninput="updateFilm(${idx},'title',this.value)" />
        </div>
        <div class="field">
          <label>Start Date</label>
          <input type="date" id="f-${idx}-startDate" value="${film.startDate || ''}" oninput="updateFilm(${idx},'startDate',this.value)" />
        </div>
        <div class="field">
          <label>End Date</label>
          <input type="date" id="f-${idx}-endDate" value="${film.endDate || ''}" oninput="updateFilm(${idx},'endDate',this.value)" />
        </div>
        <div class="field">
          <label>Showtime</label>
          <input type="text" id="f-${idx}-showtime" value="${esc(film.showtime || '')}" oninput="updateFilm(${idx},'showtime',this.value)" placeholder="e.g. 8:00pm nightly" />
        </div>
        <div class="field">
          <label>Rating</label>
          <select id="f-${idx}-rating" onchange="updateFilm(${idx},'rating',this.value)">${ratings}</select>
        </div>
        <div class="field">
          <label>Duration</label>
          <input type="text" id="f-${idx}-duration" value="${esc(film.duration || '')}" oninput="updateFilm(${idx},'duration',this.value)" placeholder="e.g. 126 min" />
        </div>
        <div class="field full">
          <label>Description</label>
          <textarea id="f-${idx}-description" oninput="updateFilm(${idx},'description',this.value)">${esc(film.description || '')}</textarea>
        </div>
        <div class="field full">
          <label>YouTube Trailer ID</label>
          <input type="text" id="f-${idx}-ytId" value="${esc(film.trailerYouTubeId || '')}" oninput="updateFilm(${idx},'trailerYouTubeId',this.value);updateYtPreview(${idx})" placeholder="e.g. IhgcUArO3Uo" />
          <div class="yt-preview-wrap ${film.trailerYouTubeId ? 'visible' : ''}" id="yt-preview-${idx}">
            <img id="yt-img-${idx}" src="${film.trailerYouTubeId ? 'https://img.youtube.com/vi/'+film.trailerYouTubeId+'/maxresdefault.jpg' : ''}" alt="Trailer thumbnail" />
          </div>
        </div>
        <div class="field">
          <label>Movie Key (URL slug)</label>
          <input type="text" id="f-${idx}-key" value="${esc(film.key || '')}" oninput="updateFilm(${idx},'key',this.value)" placeholder="e.g. bride" />
        </div>
        <div class="field">
          <label>Special Note (optional)</label>
          <input type="text" id="f-${idx}-specialNote" value="${esc(film.specialNote || '')}" oninput="updateFilm(${idx},'specialNote',this.value)" placeholder="e.g. Real D 3D · Special Engagement" />
          <div class="toggle-row" style="margin-top:8px;">
            <input type="checkbox" id="f-${idx}-badge3D" ${film.badge3D ? 'checked' : ''} onchange="updateFilm(${idx},'badge3D',this.checked)" />
            <label for="f-${idx}-badge3D">Show "Real D 3D" badge on poster</label>
          </div>
        </div>
      </div>`;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Expand / collapse ────────────────────────────────────────────
  function toggleExpand(idx) {
    const row = document.getElementById(`film-row-${idx}`);
    row.classList.toggle('expanded');
  }

  // ── Update film field ────────────────────────────────────────────
  function updateFilm(idx, field, value) {
    films[idx][field] = value;
    // Re-render the row header to reflect date/title changes
    const row = document.getElementById(`film-row-${idx}`);
    if (!row) return;
    const status = getStatus(films[idx]);
    const dateRange = films[idx].startDate ? formatDateRange(films[idx].startDate, films[idx].endDate) : '—';
    const titleEl = row.querySelector('.film-row-title');
    const datesEl = row.querySelector('.film-row-dates');
    const badgeEl = row.querySelector('.status-badge').parentElement;
    if (titleEl) titleEl.textContent = films[idx].title || 'Untitled';
    if (datesEl) datesEl.textContent = `${dateRange} · ${films[idx].showtime || ''}`;
    // Update playing state
    row.classList.toggle('is-playing', status === 'playing');
    row.classList.toggle('is-past',    status === 'past');
    updateSummary();
  }

  // ── YouTube preview ──────────────────────────────────────────────
  function updateYtPreview(idx) {
    const ytId = films[idx].trailerYouTubeId || '';
    const wrap = document.getElementById(`yt-preview-${idx}`);
    const img  = document.getElementById(`yt-img-${idx}`);
    if (!wrap || !img) return;
    if (ytId.trim().length > 5) {
      img.src = `https://img.youtube.com/vi/${ytId.trim()}/maxresdefault.jpg`;
      wrap.classList.add('visible');
    } else {
      wrap.classList.remove('visible');
    }
  }

  function bindYtPreviews() {
    // Already handled via oninput in the form HTML
  }

  // ── Delete film ──────────────────────────────────────────────────
  function deleteFilm(idx) {
    const title = films[idx].title || 'this film';
    if (!confirm(`Delete "${title}"? This cannot be undone until you Save & Deploy.`)) return;
    films.splice(idx, 1);
    renderFilmList();
    setStatus('Film removed. Click Save & Deploy to apply.', '');
  }

  // ── Add new film ─────────────────────────────────────────────────
  document.getElementById('btn-add-film').addEventListener('click', () => {
    const newFilm = {
      key: '', title: '',
      startDate: '', endDate: '',
      showtime: '8:00pm nightly',
      rating: 'G', duration: '',
      description: '', trailerYouTubeId: '',
      trailerStartSeconds: 0,
      badge3D: false, specialNote: '',
    };
    films.push(newFilm);
    renderFilmList();
    // Auto-expand the new film
    const newIdx = films.length - 1;
    const row = document.getElementById(`film-row-${newIdx}`);
    if (row) {
      row.classList.add('expanded');
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    setStatus('New film added. Fill in the details, then Save & Deploy.', '');
  });

  // ── Save & Deploy ────────────────────────────────────────────────
  async function saveFilms() {
    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Saving…';
    setStatus('Sending to server…', '');

    try {
      const res = await fetch('/api/update-movies', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: adminPassword, movies: { films } }),
      });
      const data = await res.json();

      if (res.ok && data.ok) {
        setStatus('✓ Saved! Site will update in ~30 seconds.', 'success');
      } else {
        setStatus('✗ Error: ' + (data.error || 'Unknown error'), 'error');
        if (res.status === 401) {
          adminPassword = '';
          document.getElementById('lock-screen').style.display  = 'flex';
          document.getElementById('admin-panel').style.display  = 'none';
          document.getElementById('save-bar').style.display     = 'none';
          document.getElementById('lock-error').style.display   = 'block';
          document.getElementById('lock-error').textContent     = 'Session expired. Please log in again.';
        }
      }
    } catch (err) {
      setStatus('✗ Network error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Save &amp; Deploy';
    }
  }

  function setStatus(msg, cls) {
    const el = document.getElementById('save-status');
    el.textContent = msg;
    el.className = 'save-status' + (cls ? ' ' + cls : '');
  }
</script>
</body>
</html>
