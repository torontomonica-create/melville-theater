<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melville Theatre — Admin</title>
  <link rel="icon" href="../fav/favicon.ico" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:   #e8a020;
      --amber-d: #c07010;
      --bg:      #0d0d0d;
      --surface: #161616;
      --card:    #1e1e1e;
      --border:  #2e2e2e;
      --text:    #e8e8e8;
      --muted:   #888;
      --green:   #2db37a;
      --red:     #d94f4f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.55;
      min-height: 100vh;
    }

    /* ── Header ── */
    .admin-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--amber);
    }
    .admin-logo span { color: var(--text); font-weight: 400; }
    .admin-header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-view-site {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .btn-view-site:hover { border-color: var(--amber); color: var(--amber); }

    /* ── Layout ── */
    .admin-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* ── Lock screen ── */
    #lock-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 61px);
      gap: 20px;
      padding: 40px 20px;
    }
    .lock-icon { font-size: 48px; line-height: 1; }
    .lock-title { font-size: 22px; font-weight: 700; }
    .lock-sub   { color: var(--muted); font-size: 14px; }
    .lock-form  { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .lock-form input {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 15px;
      width: 220px;
      outline: none;
      transition: border-color .2s;
    }
    .lock-form input:focus { border-color: var(--amber); }
    .btn-unlock {
      background: var(--amber);
      color: #000;
      border: none;
      padding: 11px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-unlock:hover { background: var(--amber-d); }
    .lock-error { color: var(--red); font-size: 14px; display: none; }

    /* ── Section titles ── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Movie form card ── */
    .movie-form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .movie-form-card.now-playing {
      border-color: var(--amber);
      box-shadow: 0 0 0 1px rgba(232,160,32,.15);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .card-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .badge-now  { background: var(--amber);   color: #000; }
    .badge-soon { background: var(--border);  color: var(--muted); }
    .card-header-title { font-size: 15px; font-weight: 600; flex: 1; }
    .card-slot-label { font-size: 12px; color: var(--muted); margin-left: auto; }

    /* ── Form grid ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: var(--amber); }
    .field textarea { resize: vertical; min-height: 64px; }
    .field select option { background: var(--card); }

    /* ── YouTube preview ── */
    .yt-preview-wrap {
      margin-top: 10px;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16/9;
      background: #000;
      display: none;
    }
    .yt-preview-wrap.visible { display: block; }
    .yt-preview-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .yt-preview-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ── Toggle: 3D badge / Special note ── */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }
    .toggle-row label { margin: 0; font-size: 13px; color: var(--text); text-transform: none; letter-spacing: 0; font-weight: 400; cursor: pointer; }
    .toggle-row input[type=checkbox] {
      width: 16px; height: 16px; accent-color: var(--amber); cursor: pointer;
      background: transparent; border: none; padding: 0;
    }

    /* ── Coming Soon slots header ── */
    .slots-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    /* ── Save bar ── */
    .save-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 99;
    }
    .save-status {
      font-size: 14px;
      color: var(--muted);
      flex: 1;
    }
    .save-status.success { color: var(--green); }
    .save-status.error   { color: var(--red);   }

    .btn-save {
      background: var(--amber);
      color: #000;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      white-space: nowrap;
    }
    .btn-save:hover    { background: var(--amber-d); }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════ HEADER -->
<header class="admin-header">
  <div class="admin-logo">MELVILLE <span>Admin</span></div>
  <div class="admin-header-right">
    <a class="btn-view-site" href="/" target="_blank">View Site ↗</a>
  </div>
</header>

<!-- ═══════════════════════════════ LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">Admin Login</div>
  <div class="lock-sub">Enter the admin password to continue</div>
  <form class="lock-form" id="lock-form">
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
    <button type="submit" class="btn-unlock">Unlock</button>
  </form>
  <div class="lock-error" id="lock-error">Incorrect password. Try again.</div>
</div>

<!-- ═══════════════════════════════ ADMIN PANEL (hidden until unlocked) -->
<div class="admin-wrap" id="admin-panel" style="display:none;">

  <!-- NOW PLAYING -->
  <div class="section-title">Now Playing</div>
  <div class="movie-form-card now-playing" id="form-now">
    <div class="card-header">
      <span class="card-badge badge-now">Now Playing</span>
      <span class="card-header-title" id="now-header-title">—</span>
    </div>
    <div class="form-grid">
      <div class="field full">
        <label>Movie Title</label>
        <input type="text" id="now-title" placeholder="e.g. The Bride" />
      </div>
      <div class="field">
        <label>Date Range</label>
        <input type="text" id="now-dateRange" placeholder="e.g. MAR 13–19" />
      </div>
      <div class="field">
        <label>Showtime</label>
        <input type="text" id="now-showtime" placeholder="e.g. 8:00pm nightly" />
      </div>
      <div class="field">
        <label>Rating</label>
        <select id="now-rating">
          <option value="G">G</option>
          <option value="PG">PG</option>
          <option value="14A">14A</option>
          <option value="18A">18A</option>
          <option value="R">R</option>
        </select>
      </div>
      <div class="field">
        <label>Duration</label>
        <input type="text" id="now-duration" placeholder="e.g. 126 min" />
      </div>
      <div class="field full">
        <label>Description (1–2 sentences)</label>
        <textarea id="now-description" rows="2" placeholder="Brief description shown under the title..."></textarea>
      </div>
      <div class="field full">
        <label>YouTube Trailer ID</label>
        <input type="text" id="now-trailerYouTubeId" placeholder="e.g. IhgcUArO3Uo" />
        <div class="yt-preview-label">Poster &amp; background video are pulled from this YouTube video automatically.</div>
        <div class="yt-preview-wrap" id="now-yt-preview">
          <img id="now-yt-img" src="" alt="Trailer thumbnail" />
        </div>
      </div>
      <div class="field full">
        <label>Movie Key (URL slug — letters/numbers only, no spaces)</label>
        <input type="text" id="now-key" placeholder="e.g. bride" />
      </div>
    </div>
  </div>

  <!-- COMING SOON -->
  <div class="section-title" style="margin-top:8px;">Coming Soon</div>

  <!-- Slot 1 -->
  <div class="movie-form-card" id="form-soon-0">
    <div class="card-header">
      <span class="card-badge badge-soon">Coming Soon</span>
      <span class="card-header-title" id="soon-0-header-title">Slot 1</span>
    </div>
    <div class="form-grid">
      <div class="field full">
        <label>Movie Title</label>
        <input type="text" id="soon-0-title" placeholder="e.g. Project Hail Mary" />
      </div>
      <div class="field">
        <label>Date Range</label>
        <input type="text" id="soon-0-dateRange" placeholder="e.g. MAR 20–26" />
      </div>
      <div class="field">
        <label>Showtime</label>
        <input type="text" id="soon-0-showtime" placeholder="e.g. 7:00pm" />
      </div>
      <div class="field">
        <label>Rating</label>
        <select id="soon-0-rating">
          <option value="G">G</option>
          <option value="PG">PG</option>
          <option value="14A">14A</option>
          <option value="18A">18A</option>
          <option value="R">R</option>
        </select>
      </div>
      <div class="field">
        <label>Duration</label>
        <input type="text" id="soon-0-duration" placeholder="e.g. 157 min" />
      </div>
      <div class="field full">
        <label>Description</label>
        <textarea id="soon-0-description" rows="2"></textarea>
      </div>
      <div class="field full">
        <label>YouTube Trailer ID</label>
        <input type="text" id="soon-0-trailerYouTubeId" placeholder="e.g. m08TxIsFTRI" />
        <div class="yt-preview-wrap" id="soon-0-yt-preview">
          <img id="soon-0-yt-img" src="" alt="Trailer thumbnail" />
        </div>
      </div>
      <div class="field full">
        <label>Movie Key</label>
        <input type="text" id="soon-0-key" placeholder="e.g. hailmary" />
      </div>
      <div class="field full">
        <label>Special Note (optional)</label>
        <input type="text" id="soon-0-specialNote" placeholder="e.g. Special Two-Week Engagement · Real D 3D" />
        <div class="toggle-row" style="margin-top:8px;">
          <input type="checkbox" id="soon-0-badge3D" />
          <label for="soon-0-badge3D">Show "Real D 3D" badge on poster</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Slot 2 -->
  <div class="movie-form-card" id="form-soon-1">
    <div class="card-header">
      <span class="card-badge badge-soon">Coming Soon</span>
      <span class="card-header-title" id="soon-1-header-title">Slot 2</span>
    </div>
    <div class="form-grid">
      <div class="field full">
        <label>Movie Title</label>
        <input type="text" id="soon-1-title" placeholder="e.g. The Super Mario Galaxy Movie" />
      </div>
      <div class="field">
        <label>Date Range</label>
        <input type="text" id="soon-1-dateRange" placeholder="e.g. APR 3–16" />
      </div>
      <div class="field">
        <label>Showtime</label>
        <input type="text" id="soon-1-showtime" placeholder="e.g. 7:00pm + 2:00pm Sat & Sun" />
      </div>
      <div class="field">
        <label>Rating</label>
        <select id="soon-1-rating">
          <option value="G">G</option>
          <option value="PG">PG</option>
          <option value="14A">14A</option>
          <option value="18A">18A</option>
          <option value="R">R</option>
        </select>
      </div>
      <div class="field">
        <label>Duration</label>
        <input type="text" id="soon-1-duration" placeholder="e.g. 98 min" />
      </div>
      <div class="field full">
        <label>Description</label>
        <textarea id="soon-1-description" rows="2"></textarea>
      </div>
      <div class="field full">
        <label>YouTube Trailer ID</label>
        <input type="text" id="soon-1-trailerYouTubeId" placeholder="e.g. En5QZmL5R1s" />
        <div class="yt-preview-wrap" id="soon-1-yt-preview">
          <img id="soon-1-yt-img" src="" alt="Trailer thumbnail" />
        </div>
      </div>
      <div class="field full">
        <label>Movie Key</label>
        <input type="text" id="soon-1-key" placeholder="e.g. mario" />
      </div>
      <div class="field full">
        <label>Special Note (optional)</label>
        <input type="text" id="soon-1-specialNote" placeholder="e.g. Special Two-Week Engagement · Real D 3D" />
        <div class="toggle-row" style="margin-top:8px;">
          <input type="checkbox" id="soon-1-badge3D" />
          <label for="soon-1-badge3D">Show "Real D 3D" badge on poster</label>
        </div>
      </div>
    </div>
  </div>

  <!-- spacer for fixed save bar -->
  <div style="height:20px;"></div>
</div>

<!-- ═══════════════════════════════ SAVE BAR -->
<div class="save-bar" id="save-bar" style="display:none;">
  <div class="save-status" id="save-status">All changes saved.</div>
  <button class="btn-save" id="btn-save" onclick="saveMovies()">Save &amp; Deploy</button>
</div>

<!-- ═══════════════════════════════ SCRIPT -->
<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let adminPassword = '';
  let moviesData    = null;

  // ── Lock screen ───────────────────────────────────────────────────────────
  document.getElementById('lock-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = document.getElementById('pw-input').value.trim();
    if (!pw) return;
    adminPassword = pw;

    // Try to load movies.json to verify access (it's a public file)
    try {
      await loadMovies();
      unlock();
    } catch (err) {
      document.getElementById('lock-error').style.display = 'block';
      document.getElementById('lock-error').textContent = 'Could not load movie data. Check your connection.';
    }
  });

  function unlock() {
    document.getElementById('lock-screen').style.display  = 'none';
    document.getElementById('admin-panel').style.display  = 'block';
    document.getElementById('save-bar').style.display     = 'flex';
    document.getElementById('lock-error').style.display   = 'none';
    populateForm();
    bindYtPreviews();
  }

  // ── Load movies.json ──────────────────────────────────────────────────────
  async function loadMovies() {
    const res = await fetch('/movies.json?bust=' + Date.now());
    if (!res.ok) throw new Error('Failed to fetch movies.json');
    moviesData = await res.json();
  }

  // ── Populate form from moviesData ─────────────────────────────────────────
  function populateForm() {
    const np = moviesData.nowPlaying;
    setVal('now-title',            np.title);
    setVal('now-dateRange',        np.dateRange);
    setVal('now-showtime',         np.showtime);
    setVal('now-rating',           np.rating);
    setVal('now-duration',         np.duration);
    setVal('now-description',      np.description);
    setVal('now-trailerYouTubeId', np.trailerYouTubeId);
    setVal('now-key',              np.key);
    updateHeader('now-header-title', np.title);
    showYtPreview('now', np.trailerYouTubeId);

    moviesData.comingSoon.forEach((m, i) => {
      if (i > 1) return; // only 2 slots
      setVal(`soon-${i}-title`,            m.title);
      setVal(`soon-${i}-dateRange`,        m.dateRange);
      setVal(`soon-${i}-showtime`,         m.showtime);
      setVal(`soon-${i}-rating`,           m.rating);
      setVal(`soon-${i}-duration`,         m.duration);
      setVal(`soon-${i}-description`,      m.description);
      setVal(`soon-${i}-trailerYouTubeId`, m.trailerYouTubeId);
      setVal(`soon-${i}-key`,             m.key);
      setVal(`soon-${i}-specialNote`,      m.specialNote || '');
      document.getElementById(`soon-${i}-badge3D`).checked = !!m.badge3D;
      updateHeader(`soon-${i}-header-title`, m.title || `Slot ${i + 1}`);
      showYtPreview(`soon-${i}`, m.trailerYouTubeId);
    });
  }

  function setVal(id, val) {
    const el = document.getElementById(id);
    if (!el) return;
    el.value = val || '';
  }

  function updateHeader(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text || '—';
  }

  // ── YouTube preview ────────────────────────────────────────────────────────
  function showYtPreview(prefix, ytId) {
    const wrap = document.getElementById(`${prefix}-yt-preview`);
    const img  = document.getElementById(`${prefix}-yt-img`);
    if (!wrap || !img) return;
    if (ytId && ytId.trim().length > 5) {
      img.src = `https://img.youtube.com/vi/${ytId.trim()}/maxresdefault.jpg`;
      wrap.classList.add('visible');
    } else {
      wrap.classList.remove('visible');
    }
  }

  function bindYtPreviews() {
    const pairs = [
      ['now-trailerYouTubeId',    'now'],
      ['soon-0-trailerYouTubeId', 'soon-0'],
      ['soon-1-trailerYouTubeId', 'soon-1'],
    ];
    pairs.forEach(([inputId, prefix]) => {
      const el = document.getElementById(inputId);
      if (!el) return;
      el.addEventListener('input', () => showYtPreview(prefix, el.value));
    });

    // Live-update card header titles
    ['now-title', 'soon-0-title', 'soon-1-title'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      const headerId = id === 'now-title' ? 'now-header-title'
                     : id === 'soon-0-title' ? 'soon-0-header-title'
                     : 'soon-1-header-title';
      el.addEventListener('input', () => updateHeader(headerId, el.value));
    });
  }

  // ── Collect form → JSON ────────────────────────────────────────────────────
  function collectMovies() {
    return {
      nowPlaying: {
        key:              getVal('now-key'),
        title:            getVal('now-title'),
        dateRange:        getVal('now-dateRange'),
        showtime:         getVal('now-showtime'),
        rating:           getVal('now-rating'),
        duration:         getVal('now-duration'),
        description:      getVal('now-description'),
        trailerYouTubeId: getVal('now-trailerYouTubeId'),
        posterUrl:        '',
        badge3D:          false,
        specialNote:      '',
      },
      comingSoon: [0, 1].map(i => ({
        key:              getVal(`soon-${i}-key`),
        title:            getVal(`soon-${i}-title`),
        dateRange:        getVal(`soon-${i}-dateRange`),
        showtime:         getVal(`soon-${i}-showtime`),
        rating:           getVal(`soon-${i}-rating`),
        duration:         getVal(`soon-${i}-duration`),
        description:      getVal(`soon-${i}-description`),
        trailerYouTubeId: getVal(`soon-${i}-trailerYouTubeId`),
        trailerStartSeconds: 0,
        posterUrl:        '',
        badge3D:          document.getElementById(`soon-${i}-badge3D`).checked,
        specialNote:      getVal(`soon-${i}-specialNote`),
      })),
    };
  }

  function getVal(id) {
    const el = document.getElementById(id);
    return el ? el.value.trim() : '';
  }

  // ── Save & Deploy ─────────────────────────────────────────────────────────
  async function saveMovies() {
    const btn    = document.getElementById('btn-save');
    const status = document.getElementById('save-status');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Saving…';
    status.className = 'save-status';
    status.textContent = 'Sending to server…';

    const movies = collectMovies();

    try {
      const res = await fetch('/api/update-movies', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: adminPassword, movies }),
      });

      const data = await res.json();

      if (res.ok && data.ok) {
        status.className = 'save-status success';
        status.textContent = '✓ Saved! Site will update in ~30 seconds.';
        moviesData = movies;
      } else {
        status.className = 'save-status error';
        status.textContent = '✗ Error: ' + (data.error || 'Unknown error');
        if (res.status === 401) {
          // Wrong password — kick back to lock screen
          adminPassword = '';
          document.getElementById('lock-screen').style.display  = 'flex';
          document.getElementById('admin-panel').style.display  = 'none';
          document.getElementById('save-bar').style.display     = 'none';
          document.getElementById('lock-error').style.display   = 'block';
          document.getElementById('lock-error').textContent     = 'Session expired or incorrect password.';
        }
      }
    } catch (err) {
      status.className = 'save-status error';
      status.textContent = '✗ Network error: ' + err.message;
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Save &amp; Deploy';
    }
  }
</script>
</body>
</html>
